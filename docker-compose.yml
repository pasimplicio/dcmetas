services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - SQLITE_PATH=/data/database.sqlite
      - PORT=3001
    volumes:
      - ./data:/data
      - ./backups:/backups
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
